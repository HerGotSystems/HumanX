<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HumanX — Belief → Truth → Claim → Evidence</title>
<link rel="stylesheet" href="/styles.css?v=10">
</head>
<body>
<noscript>
<style>
  .noscript-notice{font-family:system-ui,sans-serif;max-width:560px;margin:48px auto;padding:32px;border:1px solid #ccc;border-radius:8px;line-height:1.6;color:#222}
  .noscript-notice h1{margin:0 0 12px;font-size:1.4rem}
  .noscript-notice p{margin:0 0 10px;font-size:.95rem}
  .noscript-notice a{color:#2563eb}
</style>
<div class="noscript-notice">
  <h1>HumanX</h1>
  <p>HumanX is a tool for mapping beliefs, recording what circulates as fact, and pressure-testing public claims with structured evidence.</p>
  <p>It organises what people assert and what challenges those assertions. It does not automatically decide what is true.</p>
  <p><strong>JavaScript is required.</strong> Please enable JavaScript in your browser to use HumanX.</p>
  <p>Live app: <a href="https://humanx.rinkimirikata.com">humanx.rinkimirikata.com</a></p>
</div>
</noscript>
<main class="app-shell">
<header class="commandbar">
  <div class="brand"><span class="badge b-green">LIVE</span><strong>HumanX</strong><span id="who" class="badge">anonymous</span></div>
  <nav class="tabs"><button id="tab-home" class="tab active" onclick="setMode('home')">Home</button><button id="tab-belief" class="tab" onclick="location.href='/apps/humanx-belief-engine/'">Beliefs</button><button id="tab-drift" class="tab" onclick="setMode('drift')">Drift</button><button id="tab-arena" class="tab" onclick="setMode('arena')">Claims</button><button id="tab-submit" class="tab" onclick="setMode('submit')">Submit</button><button id="tab-vault" class="tab" onclick="setMode('vault')">Evidence</button><button id="tab-truths" class="tab" onclick="setMode('truths')">Truths</button><button id="tab-review" class="tab" onclick="setMode('review')">Review</button><button id="tab-export" class="tab" onclick="setMode('export')">RunPack</button></nav>
  <div class="statusline"><span id="dot" class="dot"></span><span id="status" class="small">Starting…</span></div>
</header>
<section class="searchbar"><input id="search" placeholder="Search current workspace..." oninput="searchCurrent()"><select id="filter" onchange="searchCurrent()"><option value="all">All verdicts</option><option>Proven</option><option>Strongly Supported</option><option>Plausible</option><option>Untestable</option><option>Weak Evidence</option><option>Disproven</option><option>Reality Collapse</option></select></section>
<div class="layout">
  <section class="workspace"><div id="main"></div></section>
  <aside class="panel sidepanel"><h2>Context</h2><div id="casefile" class="small">Loading…</div><div id="side-tools"><h2>Add Evidence / Attack</h2><div class="claimbox"><input id="eTitle" placeholder="Evidence or pressure title"><select id="eKind"><option value="evidence">Support evidence</option><option value="pressure">Attack / contradiction</option></select><select id="eQuality"><option value="repeatable">Repeatable / raw data</option><option value="documented">Documented source</option><option value="media">Photo / video / screenshot</option><option value="testimony">Testimony</option><option value="vibes">Vibes / weak argument</option></select><input id="eSource" placeholder="Source URL, optional"><textarea id="eNote" placeholder="What does this prove or break?"></textarea><button class="primary" onclick="addCaseItem()">Attach to Selected Claim</button></div><h2>RunPack</h2><div class="actions"><button class="primary" onclick="generateRunPack()">Generate RunPack</button><button onclick="copyAIP()">Copy RunPack</button></div><pre id="aip" class="output">Generate a RunPack, then copy it into your AI.</pre><h2>Report</h2><div class="actions"><button class="danger" onclick="reportSelected()">Report selected claim</button></div></div></aside>
</div>
</main>
<script src="/app-v10.js?v=5"></script>
</body>
</html>
