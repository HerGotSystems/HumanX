<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HumanX — Belief → Truth → Claim → Evidence</title>
<link rel="stylesheet" href="/styles.css?v=10">
</head>
<body>
<main class="app-shell">
<header class="commandbar">
  <div class="brand"><span class="badge b-green">LIVE</span><strong>HumanX</strong><span id="who" class="badge">anonymous</span></div>
  <nav class="tabs"><button id="tab-home" class="tab active" onclick="setMode('home')">Home</button><button id="tab-belief" class="tab" onclick="location.href='/apps/humanx-belief-engine/'">Belief</button><button id="tab-drift" class="tab" onclick="setMode('drift')">Drift</button><button id="tab-arena" class="tab" onclick="setMode('arena')">Claims</button><button id="tab-submit" class="tab" onclick="setMode('submit')">Submit</button><button id="tab-vault" class="tab" onclick="setMode('vault')">Evidence</button><button id="tab-truths" class="tab" onclick="setMode('truths')">Truths</button><button id="tab-review" class="tab" onclick="setMode('review')">Review</button><button id="tab-export" class="tab" onclick="setMode('export')">RunPack</button></nav>
  <div class="statusline"><span id="dot" class="dot"></span><span id="status" class="small">Starting…</span></div>
</header>
<section class="searchbar"><input id="search" placeholder="Search current workspace..." oninput="searchCurrent()"><select id="filter" onchange="searchCurrent()"><option value="all">All verdicts</option><option>Proven</option><option>Strongly Supported</option><option>Plausible</option><option>Untestable</option><option>Weak Evidence</option><option>Disproven</option><option>Reality Collapse</option></select></section>
<div class="layout">
  <section class="workspace"><div id="main"></div></section>
  <aside class="panel sidepanel"><h2>Context</h2><div id="casefile" class="small">Loading…</div><div id="side-tools"><h2>Add Evidence / Attack</h2><div class="claimbox"><input id="eTitle" placeholder="Evidence or pressure title"><select id="eKind"><option value="evidence">Support evidence</option><option value="pressure">Attack / contradiction</option></select><select id="eQuality"><option value="repeatable">Repeatable / raw data</option><option value="documented">Documented source</option><option value="media">Photo / video / screenshot</option><option value="testimony">Testimony</option><option value="vibes">Vibes / weak argument</option></select><input id="eSource" placeholder="Source URL, optional"><textarea id="eNote" placeholder="What does this prove or break?"></textarea><button class="primary" onclick="addCaseItem()">Attach to Selected Claim</button></div><h2>RunPack Packet</h2><div class="actions"><button class="primary" onclick="generateRunPack()">Generate</button><button onclick="copyAIP()">Copy</button></div><pre id="aip" class="output">No packet generated yet.</pre><h2>Report</h2><div class="actions"><button class="danger" onclick="reportSelected()">Report selected claim</button></div></div></aside>
</div>
</main>
<script src="/app-v10.js?v=5"></script>
</body>
</html>
