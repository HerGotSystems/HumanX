<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UNTESTED — HumanX</title>
<style>
:root{color-scheme:dark;--bg:#0b0d10;--card:#151920;--line:#2b323d;--text:#f4f1e8;--muted:#aab2bf;--accent:#ff8a2a;--soft:#202631}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#202631 0,#0b0d10 42%);color:var(--text);font:16px/1.5 system-ui,sans-serif;min-height:100vh}.shell{width:min(760px,100%);margin:auto;padding:24px}.brand{font-size:12px;letter-spacing:.2em;color:var(--accent);font-weight:800}.card{background:rgba(21,25,32,.96);border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.35)}h1{font-size:clamp(38px,9vw,76px);line-height:.9;margin:16px 0}h2{font-size:28px;margin:0 0 10px}.muted{color:var(--muted)}button{font:inherit;color:inherit}.primary,.choice,.confidence{border:1px solid var(--line);border-radius:12px;background:var(--soft);padding:14px 16px;cursor:pointer;text-align:left}.primary{background:var(--accent);color:#17110b;border:0;font-weight:800;text-align:center;width:100%;margin-top:20px}.choices,.confidence-row{display:grid;gap:10px;margin-top:18px}.choice:hover,.choice:focus-visible,.confidence:hover,.confidence:focus-visible{border-color:var(--accent);outline:none}.choice.selected,.confidence.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(255,138,42,.18)}.progress{height:6px;background:var(--soft);border-radius:99px;overflow:hidden;margin:0 0 20px}.progress span{display:block;height:100%;background:var(--accent)}.eyebrow{text-transform:uppercase;letter-spacing:.15em;color:var(--accent);font-size:12px;font-weight:800}.result{border-top:1px solid var(--line);padding:16px 0}.result:first-of-type{border-top:0}.movement{display:flex;justify-content:space-between;gap:16px;padding:5px 0}.delta{font-weight:800}.error{color:#ff9b9b}.hidden{display:none}@media(max-width:560px){.shell{padding:12px}.card{padding:18px;border-radius:14px}}
</style>
</head>
<body><main class="shell"><div class="brand">HUMANX / OMNUNITY INSTRUMENT</div><section id="app" class="card" aria-live="polite"><p>Loading UNTESTED…</p></section></main>
<script>
const app=document.querySelector('#app');let instrument,sessionId,steps=[],index=0,selectedChoice=null,selectedConfidence=null;
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function api(path,options={}){const r=await fetch(path,{headers:{'content-type':'application/json',...(options.headers||{})},...options});const data=await r.json();if(!r.ok)throw new Error(data.error||'REQUEST_FAILED');return data}
function startScreen(){app.innerHTML=`<div class="eyebrow">Prediction under changing pressure</div><h1>UNTESTED</h1><p>${esc(instrument.copy.opening_text)}</p><button class="primary" id="start">Start</button>`;document.querySelector('#start').onclick=start}
async function start(){const s=await api('/api/untested/session',{method:'POST',body:JSON.stringify({instrument_version:instrument.instrument_version})});sessionId=s.session_id;steps=instrument.scenarios.flatMap(sc=>sc.variants.map(v=>({scenario:sc,variant:v})));index=0;renderStep()}
function renderStep(){const {scenario,variant}=steps[index];selectedChoice=null;selectedConfidence=null;app.innerHTML=`<div class="progress"><span style="width:${Math.round(index/steps.length*100)}%"></span></div><div class="eyebrow">${esc(scenario.title)} · ${variant.variant==='mild'?'normal situation':'changed situation'}</div><h2>${esc(variant.prompt_text)}</h2><div class="choices">${variant.choices.map(c=>`<button class="choice" data-id="${esc(c.choice_id)}">${esc(c.choice_text)}</button>`).join('')}</div><div id="confidence" class="hidden"><p class="muted">${esc(instrument.copy.confidence_prompt_text)}</p><div class="confidence-row">${instrument.confidence.map(c=>`<button class="confidence" data-value="${c.certainty_value}">${esc(c.label_text)}</button>`).join('')}</div><button class="primary" id="next" disabled>${index===steps.length-1?'See what changed':'Continue'}</button></div>`;document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>{document.querySelectorAll('.choice').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');selectedChoice=b.dataset.id;document.querySelector('#confidence').classList.remove('hidden')});document.querySelectorAll('.confidence').forEach(b=>b.onclick=()=>{document.querySelectorAll('.confidence').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');selectedConfidence=Number(b.dataset.value);document.querySelector('#next').disabled=false});document.querySelector('#next').onclick=submitStep}
async function submitStep(){const {scenario,variant}=steps[index];await api('/api/untested/response',{method:'POST',body:JSON.stringify({session_id:sessionId,scenario_id:scenario.scenario_id,variant:variant.variant,choice_id:selectedChoice,certainty_stated:selectedConfidence})});index++;if(index<steps.length)renderStep();else renderResults()}
const sign=n=>n>0?`+${n}`:`${n}`;
async function renderResults(){const data=await api(`/api/untested/results?session_id=${encodeURIComponent(sessionId)}`);app.innerHTML=`<div class="eyebrow">Your prediction shifts</div><h2>Nothing here is a verdict.</h2><p>${esc(instrument.copy.results_intro_text)}</p>${data.scenarios.map(s=>`<div class="result"><h3>${esc(s.title)}</h3><div class="movement"><span>Action orientation</span><span class="delta">${s.movements.action_orientation_changed?'changed':'held'}</span></div><div class="movement"><span>Prioritised value</span><span class="delta">${s.movements.value_changed?'changed':'held'}</span></div><div class="movement"><span>Involvement</span><span class="delta">${sign(s.movements.involvement_delta)}</span></div><div class="movement"><span>Personal cost accepted</span><span class="delta">${sign(s.movements.personal_cost_delta)}</span></div><div class="movement"><span>Confidence</span><span class="delta">${sign(s.movements.confidence_delta)}</span></div></div>`).join('')}<p>${esc(instrument.copy.closing_text)}</p><button class="primary" onclick="location.reload()">Run again</button>`}
(async()=>{try{instrument=await api('/api/untested/instrument');startScreen()}catch(e){app.innerHTML=`<h2>UNTESTED is not ready yet.</h2><p class="error">${esc(e.message)}</p><p class="muted">The D1 schema and sealed instrument version must be installed before this page can run.</p>`}})();
</script></body></html>
