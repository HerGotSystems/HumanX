name: HumanX Read Smoke

# Triggers:
#   - workflow_dispatch: manual run from GitHub Actions UI
#   - pull_request: runs on every PR to main (read-only, no secrets required)
#
# This workflow only calls GET endpoints on the live HumanX Worker.
# It does not mutate any data, does not use Wrangler, does not touch D1,
# and does not require any GitHub secrets.

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  read-smoke:
    name: Read-only endpoint smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run read-only smoke test
        env:
          HUMANX_BASE_URL: https://humanx.rinkimirikata.com
        run: node scripts/read-endpoint-smoke-test.mjs
