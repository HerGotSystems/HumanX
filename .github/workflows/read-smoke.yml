name: HumanX Read Smoke

# PR runs validate the checked-out branch without touching live infrastructure.
# Manual workflow_dispatch runs keep the original read-only production smoke.
# Neither path performs POST/PUT/PATCH/DELETE, Wrangler, D1 commands, or migrations.

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  read-smoke:
    name: Read-only endpoint smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate PR branch
        if: github.event_name == 'pull_request'
        run: |
          node --check src/worker-entry.js
          node --check src/untested.js
          node scripts/untested-static-check.mjs
          python3 scripts/untested-trigger-smoke.py

      - name: Run production read-only smoke test
        if: github.event_name == 'workflow_dispatch'
        env:
          HUMANX_BASE_URL: https://humanx.rinkimirikata.com
        run: node scripts/read-endpoint-smoke-test.mjs
